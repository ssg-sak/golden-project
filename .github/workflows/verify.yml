name: Verify application and policy pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Build production bundle
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  python:
    name: Backend, analysis, and policy release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install scikit-learn matplotlib seaborn

      - name: Run analysis tests
        run: python -m pytest tests/unit/ai_model -q

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest ../tests/unit/backend ../tests/integration/backend -q

      - name: Validate and rebuild the committed policy release
        run: python ai-model/build_policy_release.py

      - name: Regenerate EDA artifacts
        run: python scripts/generate_eda_portfolio.py

      - name: Verify the policy release remains deterministic
        run: git diff --exit-code -- data/processed/policy_release.json frontend/public/data/policy_release.json
